name: remote-ssh
version: 1.1.0
description: SSH into remote servers and execute commands. Manage multiple connections with health checks, sudo support, and persistent profiles.
author: Hermes
pip_dependencies:
  - paramiko
provides_tools:
  - remote_connect
  - remote_disconnect
  - remote_list
  - remote_exec
  - remote_info
  - remote_health
  - remote_set_cwd
  - remote_sudo
